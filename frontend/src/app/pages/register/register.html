<div class="auth-container">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>Criar Conta EcoPT 🌍</mat-card-title>
      <mat-card-subtitle>Junta-te à mudança sustentável</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nome Completo</mat-label>
          <input matInput formControlName="name" placeholder="Ex: João Silva">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="email@exemplo.pt">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password">
          <mat-hint>Mínimo 7 caracteres</mat-hint>
        </mat-form-field>

        @if (error) {
          <div class="error-msg">{{ error }}</div>
        }

        <div class="actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="registerForm.invalid || isLoading">
            {{ isLoading ? 'A processar...' : 'REGISTAR' }}
          </button>
          <a mat-button routerLink="/login">Já tenho conta</a>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</div>
