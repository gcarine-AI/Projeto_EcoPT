<div class="history-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Histórico de Emissões 📋</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
        <ng-container matColumnDef="created_at">
          <th mat-header-cell *matHeaderCellDef>Data</th>
          <td mat-cell *matCellDef="let element">
            {{ element.created_at | date: 'dd/MM/yyyy HH:mm' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="total_co2">
          <th mat-header-cell *matHeaderCellDef>Emissão (ton CO₂)</th>
          <td mat-cell *matCellDef="let element">
            <strong>{{ element.total_co2 | number: '1.1-2' }}</strong>
          </td>
        </ng-container>

        <ng-container matColumnDef="diet">
          <th mat-header-cell *matHeaderCellDef>Dieta</th>
          <td mat-cell *matCellDef="let element">{{ element.diet }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Ações</th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button color="primary" [routerLink]="['/calculator', element.id]">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteCalculation(element.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="4">Ainda não existem cálculos registados.</td>
        </tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
